<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe From Harm</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        ios: {
                            blue: '#0071E3',
                            red: '#FF3B30',
                            green: '#34C759'
                        }
                    },
                    animation: {
                        'enter': 'enter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        enter: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #FFFFFF; /* No distinct background, pure white */
            color: #1D1D1F;
            -webkit-font-smoothing: antialiased;
        }

        .hidden-screen {
            display: none !important;
        }

        .mac-input {
            background: #F3F4F6;
            border: 1.5px solid transparent;
            transition: all 0.2s ease;
        }

        .mac-input:focus {
            background: #FFFFFF;
            border-color: #0071E3;
            box-shadow: 0 4px 20px rgba(0, 113, 227, 0.15);
        }

        .mac-btn:active {
            transform: scale(0.96);
        }

        /* Clean Scrollbar */
        ::-webkit-scrollbar { width: 4px; } 
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden flex justify-center">

    <main class="w-full max-w-[400px] h-full relative flex flex-col">
        
        <div id="toast-container" class="absolute top-6 left-0 right-0 z-50 flex flex-col items-center gap-2 pointer-events-none px-4"></div>

        <div id="screen-auth" class="flex-1 flex flex-col justify-center px-6 py-10 animate-enter relative overflow-y-auto">
            <div class="flex flex-col items-center mb-10">
                <div class="w-20 h-20 bg-black text-white rounded-[1.5rem] flex items-center justify-center text-4xl mb-5 shadow-xl">
                    ⚜️</div>
                <h1 class="text-3xl font-black tracking-tight text-center">Safe From Harm</h1>
                <p class="text-gray-500 text-sm font-medium mt-1 text-center">Sign in to start your journey</p>
            </div>

            <form id="login-form" class="space-y-4 w-full">
                <input type="email" id="login-email"
                    class="mac-input w-full px-6 py-4 rounded-full outline-none font-semibold text-sm"
                    placeholder="Email Address" required>
                <div class="relative">
                    <input type="password" id="login-password"
                        class="mac-input w-full px-6 py-4 rounded-full outline-none font-semibold text-sm"
                        placeholder="Password" required>
                    <button type="button" onclick="togglePassword('login-password', this)"
                        class="absolute right-5 top-4 text-gray-400 hover:text-black transition"><i data-lucide="eye"
                            class="w-5 h-5"></i></button>
                </div>
                <button type="submit" id="btn-login"
                    class="mac-btn w-full bg-black text-white py-4 mt-2 rounded-full font-bold text-base shadow-lg hover:shadow-xl transition-all">Sign In</button>
                <p class="text-center text-sm text-gray-500 mt-6 font-medium">New here? <a href="#"
                        onclick="toggleAuth('register')" class="text-ios-blue hover:underline font-bold">Create Account</a></p>
            </form>

            <form id="register-form" class="space-y-4 w-full hidden">
                <input type="text" id="reg-name"
                    class="mac-input w-full px-6 py-4 rounded-full outline-none font-semibold text-sm"
                    placeholder="Full Name" required>
                <input type="email" id="reg-email"
                    class="mac-input w-full px-6 py-4 rounded-full outline-none font-semibold text-sm"
                    placeholder="Email Address" required>
                <input type="password" id="reg-password"
                    class="mac-input w-full px-6 py-4 rounded-full outline-none font-semibold text-sm"
                    placeholder="Password (Min 6)" required>

                <div class="flex bg-gray-100 p-1.5 rounded-full mt-2">
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="role" value="scout" class="peer sr-only" checked>
                        <div class="py-3 text-center text-xs font-black text-gray-500 rounded-full peer-checked:bg-white peer-checked:text-black peer-checked:shadow transition-all duration-200">
                            SCOUT
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="role" value="leader" class="peer sr-only">
                        <div class="py-3 text-center text-xs font-black text-gray-500 rounded-full peer-checked:bg-white peer-checked:text-black peer-checked:shadow transition-all duration-200">
                            LEADER
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer relative">
                        <input type="radio" name="role" value="rover" class="peer sr-only">
                        <div class="py-3 text-center text-xs font-black text-gray-500 rounded-full peer-checked:bg-white peer-checked:text-black peer-checked:shadow transition-all duration-200">
                            ROVER
                        </div>
                    </label>
                </div>

                <button type="submit" id="btn-register"
                    class="mac-btn w-full bg-black text-white py-4 mt-2 rounded-full font-bold text-base shadow-lg hover:shadow-xl transition-all">Create Account</button>
                <p class="text-center text-sm text-gray-500 mt-6 font-medium">Have an account? <a href="#"
                        onclick="toggleAuth('login')" class="text-ios-blue hover:underline font-bold">Sign In</a></p>
            </form>
        </div>

        <div id="screen-dashboard"
            class="flex-1 flex flex-col justify-center px-6 py-10 animate-enter hidden-screen relative overflow-y-auto">
            <button onclick="handleGlobalLogout()"
                class="absolute top-6 right-6 p-3 rounded-full bg-gray-50 text-ios-red shadow-sm hover:bg-red-50 transition-colors mac-btn z-10"><i
                    data-lucide="log-out" class="w-5 h-5"></i></button>
            
            <div class="text-center mt-6 mb-8">
                <div class="w-24 h-24 bg-gradient-to-br from-blue-50 to-gray-100 rounded-full mx-auto flex items-center justify-center text-5xl mb-4 shadow-sm">
                    👋</div>
                <h2 class="text-4xl font-black mb-1 text-gray-900 tracking-tight" id="dash-name">Hello</h2>
                <p class="text-xs font-bold text-ios-blue uppercase tracking-widest bg-blue-50 inline-block px-4 py-1.5 rounded-full mt-2" id="dash-role">LOADING...</p>
            </div>
            
            <div id="dash-content" class="space-y-4 w-full"></div>
        </div>

        <div id="screen-language" class="flex-1 flex flex-col justify-center px-6 py-10 animate-enter hidden-screen relative">
            <button onclick="showScreen('screen-dashboard')" class="absolute top-6 left-6 p-3 rounded-full bg-gray-50 text-gray-700 shadow-sm hover:bg-gray-100 mac-btn"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black mb-2 text-gray-900">Select Language</h2>
                <p class="text-sm text-gray-500 font-medium">ඔබ කැමති භාෂාව තෝරන්න</p>
            </div>
            <div class="space-y-4">
                <button onclick="launchQuiz('si')"
                    class="mac-btn w-full bg-[#FFDA57] text-black py-5 rounded-full font-black text-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-3">සිංහල</button>
                <button onclick="launchQuiz('en')"
                    class="mac-btn w-full bg-black text-white py-5 rounded-full font-black text-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-3">English</button>
            </div>
        </div>

        <div id="screen-quiz"
            class="flex-1 flex flex-col animate-enter hidden-screen relative">
            <div class="h-1.5 w-full bg-gray-100 absolute top-0 left-0 z-20">
                <div id="quiz-progress" class="h-full bg-ios-blue transition-all duration-500 rounded-r-full"
                    style="width: 0%"></div>
            </div>
            <div class="flex-1 flex flex-col p-6 pt-10 overflow-y-auto">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xs font-black text-gray-500 bg-gray-100 px-4 py-2 rounded-full" id="q-counter">Q 1/15</span>
                    <span class="text-sm font-black text-ios-blue font-mono tabular-nums bg-blue-50 px-4 py-2 rounded-full flex items-center gap-2"><i data-lucide="timer" class="w-4 h-4"></i> <span id="timer-text">04:00</span></span>
                </div>
                <div id="quiz-content-wrapper" class="flex-1 flex flex-col">
                    <h2 id="q-text" class="text-sm font-bold leading-relaxed mb-6 text-gray-900 overflow-y-auto max-h-[140px] pr-2">Loading...</h2>
                    <div id="answers-container" class="space-y-3 mt-auto pb-12"></div>
                </div>
            </div>
        </div>

        <div id="screen-result"
            class="flex-1 flex flex-col justify-center px-6 py-10 animate-enter hidden-screen text-center">
            <div id="res-icon" class="text-7xl mb-6 drop-shadow-xl transition-transform hover:scale-110 duration-300">🎉</div>
            <h2 id="res-title" class="text-4xl font-black mb-2 text-gray-900 tracking-tight">Completed!</h2>
            <p id="res-msg" class="text-gray-500 text-base font-medium mb-8">Your results</p>
            
            <div class="bg-gray-50 rounded-[2rem] p-8 mb-8 shadow-inner border border-gray-100 w-full mx-auto">
                <span class="text-xs font-black text-gray-400 uppercase tracking-[0.2em]">Final Score</span>
                <div id="res-score" class="text-7xl font-black text-black mt-2 tracking-tighter">0</div>
            </div>
            
            <div id="res-actions" class="space-y-4 w-full mx-auto"></div>
        </div>

        <div class="absolute bottom-4 left-0 w-full text-center pointer-events-none z-40 bg-gradient-to-t from-white to-transparent pt-6">
            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-1">Designed & Developed by</p>
            <p class="text-[10px] font-black text-gray-800 tracking-widest">MADHAWA BASNAYAKE</p>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, child, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 🔴 PASTE YOUR FIREBASE CONFIG HERE 🔴
        const firebaseConfig = {
            apiKey: "AIzaSyBSl1cirj-EoccG33hDP8U2c-LoS-ax1aQ",
            authDomain: "sfh-kegalle.firebaseapp.com",
            databaseURL: "https://sfh-kegalle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "sfh-kegalle",
            storageBucket: "sfh-kegalle.firebasestorage.app",
            messagingSenderId: "195425936198",
            appId: "1:195425936198:web:502fc46c9ec61ec2babb47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.handleGlobalLogout = async () => {
            await signOut(auth);
            location.reload();
        };

        window.toggleAuth = (mode) => {
            document.getElementById('login-form').classList.toggle('hidden', mode === 'register');
            document.getElementById('register-form').classList.toggle('hidden', mode !== 'register');
        };

        window.togglePassword = (id, btn) => {
            const input = document.getElementById(id);
            const icon = btn.querySelector('svg');
            input.type = input.type === 'password' ? 'text' : 'password';
            btn.classList.toggle('text-black');
        };

        const audio = {
            success: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
            error: new Audio('https://assets.mixkit.co/active_storage/sfx/2902/2902-preview.mp3')
        };
        let state = { userData: null, currentUser: null, lang: 'en', questions: [], qIndex: 0, score: 0, timer: null, timeLeft: 240 };

        window.showScreen = (id) => {
            document.querySelectorAll('[id^="screen-"]').forEach(el => el.classList.add('hidden-screen'));
            const target = document.getElementById(id);
            target.classList.remove('hidden-screen');
            target.style.animation = 'none'; target.offsetHeight; target.style.animation = null;
        };

        const showToast = (msg, type = 'success') => {
            const box = document.getElementById('toast-container');
            const el = document.createElement('div');
            el.className = `mx-auto bg-gray-900 text-white px-5 py-3 rounded-full shadow-2xl text-sm font-bold flex items-center gap-2 animate-enter ${type === 'error' ? 'bg-ios-red' : ''}`;
            el.innerHTML = msg; box.appendChild(el); setTimeout(() => el.remove(), 3000);
        };

        const getFriendlyError = (err) => {
            if (err.code === 'auth/invalid-credential') return 'Incorrect email or password';
            if (err.code === 'auth/email-already-in-use') return 'Email already registered';
            if (err.code === 'auth/weak-password') return 'Password too short';
            if (err.message.includes('offline')) return 'No internet connection';
            return 'Something went wrong';
        };

        window.addEventListener('load', () => {
            lucide.createIcons();
            signOut(auth);
            window.showScreen('screen-auth');
        });

        const handleAuthAction = async (formId) => {
            const btn = document.querySelector(`#${formId} button[type="submit"]`);
            const originalText = btn.innerText;
            btn.innerText = "Processing..."; btn.disabled = true;
            try {
                if (formId === 'register-form') {
                    const name = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    const pass = document.getElementById('reg-password').value;
                    const role = document.querySelector('input[name="role"]:checked').value;
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(cred.user, { displayName: name });
                    await set(ref(db, `users/${cred.user.uid}`), { uid: cred.user.uid, name, email, role, examStatus: 'pending', attempts: 0 });
                    await signOut(auth);
                    showToast('Account created! Log in now.');
                    window.toggleAuth('login');
                } else {
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-password').value;
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    const snapshot = await get(child(ref(db), `users/${cred.user.uid}`));
                    if (!snapshot.exists()) throw new Error({ code: 'custom', message: 'User data not found' });
                    state.userData = snapshot.val();
                    state.currentUser = cred.user;
                    renderDashboard();
                    showToast(`Welcome, ${state.userData.name.split(' ')[0]}`);
                }
            } catch (err) { showToast(getFriendlyError(err), 'error'); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        };
        document.getElementById('login-form').addEventListener('submit', (e) => { e.preventDefault(); handleAuthAction('login-form'); });
        document.getElementById('register-form').addEventListener('submit', (e) => { e.preventDefault(); handleAuthAction('register-form'); });

        const renderDashboard = () => {
            document.getElementById('dash-name').innerText = `${state.userData.name.split(' ')[0]}`;
            document.getElementById('dash-role').innerText = state.userData.role.toUpperCase();
            const content = document.getElementById('dash-content');

            if (state.userData.examStatus === 'passed') {
                content.innerHTML = `
                    <div class="bg-green-50 text-green-800 p-6 rounded-[2rem] text-left shadow-sm border border-green-100 mb-6">
                        <div class="flex items-center gap-3 mb-2"><i data-lucide="check-circle" class="w-6 h-6"></i><span class="font-black text-xl">Certified</span></div>
                        <p class="opacity-90 mt-1 text-sm font-medium leading-relaxed">You have successfully completed the assessment.</p>
                    </div>
                    <button onclick="generateCertificate()" class="mac-btn w-full bg-black text-white py-4 rounded-full font-bold text-base shadow-lg hover:shadow-xl flex items-center justify-center gap-3 transition-all"><span>Download Certificate</span><i data-lucide="download" class="w-5 h-5"></i></button>
                `;
            } else {
                content.innerHTML = `
                    <div class="bg-gray-50 border border-gray-100 p-6 rounded-[2rem] mb-5 text-left space-y-5 shadow-inner">
                        <div class="flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-white text-blue-600 shadow-sm flex items-center justify-center"><i data-lucide="help-circle" class="w-5 h-5"></i></div><div><p class="text-sm font-black text-gray-900">15 Questions</p><p class="text-xs font-semibold text-gray-500 mt-0.5">Randomly selected</p></div></div>
                        <div class="w-full h-px bg-gray-200"></div>
                        <div class="flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-white text-orange-500 shadow-sm flex items-center justify-center"><i data-lucide="clock" class="w-5 h-5"></i></div><div><p class="text-sm font-black text-gray-900">4 Minutes</p><p class="text-xs font-semibold text-gray-500 mt-0.5">To complete the quiz</p></div></div>
                        <div class="w-full h-px bg-gray-200"></div>
                        <div class="flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-white text-purple-600 shadow-sm flex items-center justify-center"><i data-lucide="award" class="w-5 h-5"></i></div><div><p class="text-sm font-black text-gray-900">Pass Mark: 12</p><p class="text-xs font-semibold text-gray-500 mt-0.5">Correct answers needed</p></div></div>
                    </div>
                    
                    <a href="https://your-learning-materials-link.com" target="_blank" class="mac-btn w-full bg-white border-2 border-gray-100 text-gray-800 py-4 rounded-full font-bold text-base shadow-sm hover:bg-gray-50 hover:border-gray-200 transition-all flex items-center justify-center gap-2 mb-3">
                        <span>📚 Access Learning Materials</span>
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>

                    <button onclick="checkAndLaunch()" class="mac-btn w-full bg-ios-blue text-white py-4 rounded-full font-bold text-base shadow-lg hover:shadow-xl hover:bg-blue-600 transition-all flex items-center justify-center gap-2"><span>Start Assessment</span><i data-lucide="arrow-right" class="w-5 h-5"></i></button>
                `;
            }
            lucide.createIcons();
            window.showScreen('screen-dashboard');
        };

        window.checkAndLaunch = () => {
            if (state.userData.role === 'scout' && (state.userData.attempts || 0) >= 5) {
                showToast('Attempt limit reached (5/5). Contact leader.', 'error');
                return;
            }
            window.showScreen('screen-language');
        };

        window.launchQuiz = async (lang) => {
            state.lang = lang; state.score = 0; state.qIndex = 0;
            showToast('Preparing questions...');
            const snap = await get(child(ref(db), `questions/${state.userData.role}`));
            let rawData = snap.exists() ? snap.val() : [];
            if (!Array.isArray(rawData)) rawData = Object.values(rawData);
            if (rawData.length === 0) { showToast('No questions found.', 'error'); return; }
            state.questions = rawData.sort(() => 0.5 - Math.random()).slice(0, 15);
            window.showScreen('screen-quiz');
            loadQuestion();
        };

        const loadQuestion = () => {
            clearInterval(state.timer);
            const q = state.questions[state.qIndex];
            document.getElementById('q-counter').innerText = `Q ${state.qIndex + 1} / 15`;
            document.getElementById('quiz-progress').style.width = `${((state.qIndex + 1) / 15) * 100}%`;
            document.getElementById('q-text').innerText = q.question[state.lang];
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            let opts = q.options[state.lang].map((txt, i) => ({ txt, correct: i === 0 }));
            opts.sort(() => 0.5 - Math.random());
            opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "mac-btn w-full p-5 bg-gray-50 border-2 border-transparent rounded-[24px] text-gray-800 font-bold text-sm hover:bg-white hover:border-blue-500 hover:text-blue-600 transition-all text-left shadow-sm";
                btn.innerText = opt.txt;
                btn.onclick = () => handleAnswer(opt.correct, btn);
                container.appendChild(btn);
            });
            startTimer();
        };

        const startTimer = () => {
            state.timeLeft = 240;
            const display = document.getElementById('timer-text');
            const updateTime = () => {
                const m = Math.floor(state.timeLeft / 60); const s = state.timeLeft % 60;
                display.innerText = `${m}:${s.toString().padStart(2, '0')}`;
                if (state.timeLeft <= 0) { clearInterval(state.timer); nextQuestion(); }
                state.timeLeft--;
            };
            updateTime(); state.timer = setInterval(updateTime, 1000);
        };

        const handleAnswer = (isCorrect, btn) => {
            clearInterval(state.timer);
            const allBtns = document.getElementById('answers-container').children;
            for (let b of allBtns) b.disabled = true;
            if (navigator.vibrate) navigator.vibrate(50);
            if (isCorrect) { btn.className = "w-full p-5 bg-green-500 text-white rounded-[24px] font-bold text-sm shadow-md transform scale-[1.02] transition-all border-none"; state.score++; audio.success.play().catch(() => { }); }
            else { btn.className = "w-full p-5 bg-red-500 text-white rounded-[24px] font-bold text-sm shadow-md transition-all border-none"; audio.error.play().catch(() => { }); }
            setTimeout(nextQuestion, 800);
        };

        const nextQuestion = () => {
            state.qIndex++;
            if (state.qIndex < state.questions.length) { loadQuestion(); } else { finishQuiz(); }
        };

        const finishQuiz = async () => {
            window.showScreen('screen-result');
            const passed = state.score >= 12;
            document.getElementById('res-score').innerText = `${state.score} / 15`;
            await update(ref(db, `users/${state.currentUser.uid}`), { attempts: increment(1) });
            const actions = document.getElementById('res-actions');

            if (passed) {
                document.getElementById('res-title').innerText = "Certified!";
                document.getElementById('res-title').className = "text-4xl font-black text-green-600 mb-2 tracking-tight";
                document.getElementById('res-msg').innerText = "You have successfully passed.";
                document.getElementById('res-icon').innerText = "🎓";
                const end = Date.now() + 3000;
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
                await update(ref(db, `users/${state.currentUser.uid}`), { examStatus: 'passed', score: state.score });

                actions.innerHTML = `
                    <button onclick="generateCertificate()" class="mac-btn w-full bg-black text-white py-4 rounded-full font-bold text-base shadow-lg hover:shadow-xl flex items-center justify-center gap-3 transition-all"><span>Download Certificate</span> 📜</button>
                    <button onclick="handleGlobalLogout()" class="mac-btn w-full bg-gray-100 text-ios-red py-4 rounded-full font-bold mt-3 hover:bg-gray-200 transition-colors">Log Out</button>
                `;
            } else {
                document.getElementById('res-title').innerText = "Keep Going!";
                document.getElementById('res-title').className = "text-4xl font-black text-gray-900 mb-2 tracking-tight";
                document.getElementById('res-msg').innerText = "You need 12 correct answers.";
                document.getElementById('res-icon').innerText = "💪";

                actions.innerHTML = `
                    <button onclick="window.showScreen('screen-language')" class="mac-btn w-full bg-black text-white py-4 rounded-full font-bold text-base shadow-lg hover:shadow-xl flex items-center justify-center gap-3 transition-all"><span>Try Again</span> 🔄</button>
                    <button onclick="handleGlobalLogout()" class="mac-btn w-full bg-gray-100 text-ios-red py-4 rounded-full font-bold mt-3 hover:bg-gray-200 transition-colors">Log Out</button>
                `;
            }
        };

        window.generateCertificate = () => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

            // 🔴 1. PASTE YOUR BASE64 CODE INSIDE THESE QUOTES 🔴
            const imgData = "";
            try {
                if (imgData) {
                    doc.addImage(imgData, 'JPEG', 0, 0, 297, 210, undefined, 'FAST');
                }
            } catch (e) { console.error("Image error", e); }

            doc.setFont("helvetica", "bold");
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(24);
            doc.text(state.userData.name.toUpperCase(), 148.5, 90, { align: "center" });

            const certCode = `SFH-${state.currentUser.uid.substring(0, 6).toUpperCase()}-${new Date().getFullYear()}`;
            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text(`Ref: ${certCode}`, 5, 197, { align: "left" });

            doc.save(`SFH_Certificate_${state.currentUser.uid.substring(0, 6)}.pdf`);
        };
    </script>
</body>

</html>
